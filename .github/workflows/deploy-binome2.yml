name: Deploy binome2

on:
  push:
    branches:
      - binome2

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Le gabarit lui-meme ne deploie pas : seuls les depots de groupe instancies le font.
    if: github.repository != 'jc-acobi/revue-transfo'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            DIR=/var/www/workshop/__GROUPE__/binome2
            REPO=https://github.com/${{ github.repository }}.git
            if [ -d "$DIR/.git" ]; then
              cd "$DIR"
              git fetch origin binome2
              git reset --hard origin/binome2
            else
              rm -rf "$DIR"
              git clone -b binome2 "$REPO" "$DIR"
            fi
